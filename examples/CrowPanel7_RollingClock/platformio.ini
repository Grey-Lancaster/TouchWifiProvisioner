; Self-contained except for one manual step: clone this repo, fetch
; elecrow_120m_libs (see CrowPanel7_BasicConnect/README.md#platformioini
; for where to get it and where to place it - same requirement here),
; cd into this folder, `pio run`. `lib_extra_dirs` reaches up to the
; folder containing this repo so PlatformIO picks up TouchWifiProvisioner
; itself as a library (via its library.json), the same as any other
; dependency.
; `src_dir = .` because the .ino has to live right here (not in its own
; src/ subfolder) for Arduino IDE's "File > Examples" convention to work.
[platformio]
src_dir = .

[env:crowpanel7]
; Same PSRAM-at-120MHz fix as CrowPanel7_BasicConnect - see that example's
; README for why.
platform = https://github.com/pioarduino/platform-espressif32.git#backup_Ard_30
platform_packages =
	platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/releases/download/3.0.2/esp32-3.0.2.zip
	platformio/framework-arduinoespressif32-libs@file://elecrow_120m_libs
board = ESP32-S3-WROOM-1-N16R8
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_extra_dirs = ../../..
board_build.arduino.partitions = partitions.csv
board_upload.partitions = partitions.csv
build_flags =
	-DCONFIG_SPIRAM_SPEED_120M=1
	-DLV_CONF_INCLUDE_SIMPLE
	-Iinclude
lib_deps =
	WiFi
	lvgl/lvgl@8.3.11
	lovyan03/LovyanGFX@1.2.19
	ropg/ezTime@^0.8.3
