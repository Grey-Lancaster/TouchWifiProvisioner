; Code by Grey and his buddy Claude.
;
; Self-contained: clone this repo, cd into this folder, `pio run` - no
; manual assembly needed. `lib_extra_dirs` reaches up to the folder
; containing this repo so PlatformIO picks up TouchWifiProvisioner itself
; as a library (via its library.json), the same as any other dependency.
; `src_dir = .` because the .ino has to live right here (not in its own
; src/ subfolder) for Arduino IDE's "File > Examples" convention to work.
[platformio]
src_dir = .

[env:cyd2usb]
platform = espressif32
board = esp32dev
framework = arduino
lib_extra_dirs = ../../..
lib_deps =
	WiFi
	bodmer/TFT_eSPI@^2.5.33
	paulstoffregen/XPT2046_Touchscreen
	lvgl/lvgl@^8.3.11
board_build.partitions = min_spiffs.csv
build_flags =
	-I include
	-DUSER_SETUP_LOADED
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DUSE_HSPI_PORT
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DLOAD_GLCD
	-DLOAD_FONT2
	-DLOAD_FONT4
	-DLOAD_FONT6
	-DLOAD_FONT7
	-DLOAD_FONT8
	-DLOAD_GFXFF
	-DLV_CONF_INCLUDE_SIMPLE
	-DST7789_DRIVER
	-DTFT_INVERSION_OFF
